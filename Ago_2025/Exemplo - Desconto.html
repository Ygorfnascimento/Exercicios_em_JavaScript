<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desconto de Produtos</title>
</head>
<body>
    <script>
        var preco = prompt("Digite o valor do produto: ")

        var desconto = (preco * 15.5) / 100

        alert(preco - desconto)
    </script>
</body>
</html>
