<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Temperatura</title>
</head>
<body>
    <script>
        var cel =  Number (prompt("Digite a temperatura em Celsius: "))

        var fah = cel * 1.8 + 32
        
        alert("A temperatura em Fahrenheit é: " + fah.toFixed(1))

    </script>
</body>
</html>
