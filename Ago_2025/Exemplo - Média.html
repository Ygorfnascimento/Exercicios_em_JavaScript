<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média dos Alunos </title>
</head>
<body>
    <script>
        var nota1 = Number (prompt("Digite a Primeira Nota:"))
        var nota2 = Number (prompt("Digite a Segunda Nota:"))
        var nota3 = Number (prompt("Digite a Terceira Nota:"))

        var resultado = parseInt(nota1 + nota2 + nota3) / 3

        alert("O média das notas é de: " + resultado.toFixed(1))
    </script>
</body>
</html>
