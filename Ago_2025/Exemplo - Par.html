<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par ou Ímpar</title>
</head>
<body>
    <script>
        var num1 = Number(prompt("Digite um Número: "))

        var par = num1 % 2 == 0

        if (num1 = par) {
            alert("O número digitado é par.")
        } else {
            alert("O número digitado é ímpar.")
        }

    </script>
</body>
</html>
