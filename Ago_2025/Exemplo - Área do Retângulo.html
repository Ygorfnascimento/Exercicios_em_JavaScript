<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Retângulo</title>
</head>
<body>
    
    <script>
        
        let base = Number(prompt("Digite a base do triângulo; "))
        let altura = Number(prompt("Digite a altura do triângulo:"))

        let area = Number((base * altura)/2)

        alert("A Área de um trângulo é: " + area)
    </script>

</body>
</html>
