<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva</title>
</head>
<body>
    <script>
        var num  = Number (prompt ("Digite um número: "))

        while (num >= 0) {
            num--;
            alert(num)
        }
    </script>
</body>
</html>
