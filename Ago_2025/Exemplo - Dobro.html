<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobro do Número</title>
</head>
<body>
    <script>
        // Entrada
        var num1 = prompt("Digite um Número: ")

        // Processamento
        var dobro = num1 * 2

        // Saída
        alert("O resultado é: "+ dobro)

    </script>
</body>
</html>
