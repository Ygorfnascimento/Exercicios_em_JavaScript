
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms com TailwindCSS</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-gray-100 flex justify-center items-center flex-col">

    <div class="bg-white shadow-md p-8 rounded-lg w-80">

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">
            Cadastro
        </h2>

        <form id="register-form" class="space-y-4">

            <div id="msg " class="transition-opacity duration-1000 opacity-0 text-red-400 text-center"></div>

            
            <div class="flex flex-col">
                <label for="name" class="text-sm font-medium text-gray-600">
                    Nome:
                </label>

                <input
                    type="text"
                    id="name"
                    placeholder="Digite seu nome"
                    class="rounded-md border border-gray-300 p-2 transition
                    focus:outline-none
                    focus:ring-2
                    focus:ring-blue-500
                    focus:border-blue-500"
                >
            </div>

            <div class="flex flex-col">
                <label for="email" class="text-sm font-medium text-gray-600">
                    Email:
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu email"
                    class="rounded-md border border-gray-300 p-2 transition
                    focus:outline-none
                    focus:ring-2
                    focus:ring-blue-500
                    focus:border-blue-500"
                >
            </div>

            <button
                id="submit-button"
                type="submit"
                class="w-full bg-blue-500 text-white p-2 rounded-md
                hover:bg-blue-600 transition">
                Enviar
            </button>

        </form>

        <div id="items" class="mt-4"></div>

    </div>

<script src="tail.js"></script>

</body>
</html>
