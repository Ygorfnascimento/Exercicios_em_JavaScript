<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Cadastro de Produtos</h2>

    <input type="text" id="input-nome" placeholder="Nome do Produto">
    <input type="number" id="input-preco" placeholder="Preço (R$)">
    <button id="btn-cadastrar">Cadastrar</button>

    <h3>Vitrine</h3>
    <div id="vitrine"></div>

    <script>
        const inputnome = document.getElementById('input-nome');
        const inputpreco = document.getElementById('input-preco');
        const btnCadastrar = document.getElementById('btn-cadastrar');
        const vitrine = document.getElementById('vitrine');

        btnCadastrar.addEventListener('click', function() {
            const nome = inputnome.value;
            const preco = inputpreco.value;

            if (nome === '' || preco === '') {
                alert('Por favor, preencha os dois campos!')
                return;
            }

            const novoProduto = document.createElement('p');
            novoProduto.textContent = `Produto: ${nome} - R$ ${preco}`;

            novoProduto.classList.add('card-produto');
            vitrine.appendChild(novoProduto);

            inputnome.value = '';
            inputpreco.value = '';

        })

    </script>
    
</body>
</html>
