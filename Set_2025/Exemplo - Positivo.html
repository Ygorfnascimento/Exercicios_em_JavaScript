<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num1 = Number(prompt("Digite um número: "))

        if (num1 > 0) {
            alert("O número é positivo!")
        } else if (num1 < 0) {
            alert("O número é negativo!")
        } else {
            alert("O número é zero!")
        }
    </script>
</body>
</html>
